# nbody-pipeline Default Configuration

# Path configurations for different simulations.
# This packaged default intentionally ships no site-specific paths so the
# repository works out of the box for any user. Provide a user config (see
# config.example.yaml for a fully annotated template) via --config, the
# NBODY_CONFIG environment variable, or ./nbody_config.yaml.
paths:
  simulations: {}

  # Input file paths
  input_files: {}

  # Plot directory
  plot_dir: null

  # Full root for analysis-produced intermediate caches
  analysis_cache_dir: null

# Figure name prefixes
figure_prefixes: {}

# Global processing options
processing:
  skip_until: {}
  skip_existing_plot: true
  close_figure_in_ipython: false
  processes_count: 40
  tasks_per_child: 3
  mem_max_gb: 40.0
  inode_limit: 2000000

# Global HDF5 file selection, table-cache, and scan options
hdf5:
  file_selection:
    wait_age_hour: 24
    sample_every_nb_time: 1.0
    exclude_bad_dirname: true
  table_cache:
    use_hdf5_cache: true
  scan:
    parallel: true
    incremental_from_cache_tail: true
    checkpoint_every_files: 100

# Lagrangian radii percentages to plot
selected_lagr_percent:
  - "<RC"
  - "10%"
  - "30%"
  - "50%"
  - "70%"
  - "90%"
  - "95%"

# Current-mass Lagrangian radii built from HDF5 snapshots
current_lagrangian:
  enabled: true
  cache_filename: "current_mass_lagr.feather"

# Cluster orbit in the host galaxy built from scalar HDF5 snapshots
galactic_orbit:
  enabled: true
  cache_filename: "galactic_orbit.feather"
  time_color_max_myr: 500.0

# Snapshot-level stellar energy and angular momentum in MWPotential2014
galactic_energy_angular_momentum:
  enabled: true
  percentile_limits: [0.1, 99.9]

# Binary rows containing a requested stellar type, built from HDF5 snapshots
binary_stellar_type_extraction:
  cache_filename_template: "binaries_with_{target}_until_{last_ttot:.6f}.feather"

# Per-snapshot compact-object (KW 10-14) rows, VO-safe schema, Parquet-backed
compact_object_history:
  enabled: true

# One-row-per-snapshot cluster summary, VO-safe schema, Parquet-backed
snapshot_summary:
  enabled: true

# Physical constants and thresholds
physics:
  ECLOSE_INPUT: 1.0  # Binding energy per unit mass for hard binary (positive)
  universe_age_myr: 13800.0
  IMBH_mass_range_msun: [100, 100000]
  extreme_mass_ratio_upper: 0.1
  high_BH_ecc_lower: 0.1
  PISNe_mass_gap: [64, 161]

# Stellar type mappings (KW codes)
stellar_types:
  -1: "PMS"
  0: "LMS"
  1: "MS"
  2: "HG"
  3: "GB"
  4: "CHeB"
  5: "EAGB"
  6: "TPAGB"
  7: "HeMS"
  8: "HeHG"
  9: "HeGB"
  10: "HeWD"
  11: "COWD"
  12: "ONeWD"
  13: "NS"
  14: "BH"
  15: "MLR"

# Compact object KW codes
compact_object_KW: [10, 11, 12, 13, 14]

# Interesting binary star types
wow_binary_st_list:
  - "BH-NS"

# Plot limits for various quantities
limits:
  'Distance_to_cluster_center[pc]': [0.001, 10000.0]
  'Bin A[au]': [0.001, 100000.0]
  'Bin A[au]_moderate': [0.001, 5000.0]
  'mass_ratio': [0.0005, 1.01]
  'M': [0.06, 1050.0]
  'Bin ECC': [0.0001, 1.2]
  'Teff*': [1000.0, 1050000.0]
  'L*': [0.000009, 100000000.0]
  'R*': [0.0004, 2000.0] # WD - Hayashi
  'position_pc_lim_moderate': [-7.0, 7.0]
  'position_pc_lim': [-15.0, 15.0]
  'position_pc_lim_MAX': [-2000.0, 2000.0]
  'Ebind/kT': [2.0e-7, 500.0]
  'tau_gw[Myr]': [9.0, 14000.0]
  'velocity_kmps_lim': [-200.0, 200.0]
  'sum_of_radius[au]': [1.0e-7, 1.0]
  'peri[au]': [0.0001, 100000.0]

# Column name to label mappings
column_labels:
  'Distance_to_cluster_center[pc]': "r [pc]"
  'Bin A[au]': "a [au]"
  'Bin ECC': "e"
  'mass_ratio': "mass ratio"
  'primary_mass[solar]': "primary mass [M$_\\odot$]"
  'secondary_mass[solar]': "secondary mass [M$_\\odot$]"
  'total_mass[solar]': "binary total mass [M$_\\odot$]"
  'M': "mass [M$_\\odot$]"
  'Ebind/kT': "$E_{bind}/kT$"
  'Teff*': "$T_{eff}$ [K]"
  'L*': "$L$ [L$_\\odot$]"
  'tau_gw[Myr]': "$\\tau_{gw}$ [Myr]"
  'V1': "$V_{x}$ [km/s]"
  'V2': "$V_{y}$ [km/s]"
  'V3': "$V_{z}$ [km/s]"
  'Bin cm V1': "Bin $V_{x,cm}$ [km/s]"
  'Bin cm V2': "Bin $V_{y,cm}$ [km/s]"
  'Bin cm V3': "Bin $V_{z,cm}$ [km/s]"
