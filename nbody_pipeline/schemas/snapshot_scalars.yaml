      2000/2002.
    public: true
    nullable: false
  - name: etai
    dtype: float64
    unit: null
    ucd: meta.code
    description: Irregular-force timestep accuracy parameter (raw HDF5 ETAI).
    public: true
    nullable: false
  - name: etar
    dtype: float64
    unit: null
    ucd: meta.code
    description: Regular-force timestep accuracy parameter (raw HDF5 ETAR).
    public: true
    nullable: false
  - name: etau
    dtype: float64
    unit: null
    ucd: meta.code
    description: Unperturbed-orbit timestep accuracy parameter (raw HDF5 ETAU).
    public: true
    nullable: false
  - name: eclose_nb
    dtype: float64
    unit: null
    ucd: phys.energy
    description: Hard-binary binding-energy threshold, N-body units (raw HDF5 ECLOSE).
    public: true
    nullable: false
  - name: dtmin_nb
    dtype: float64
    unit: null
    ucd: time.interval
    description: Minimum integration timestep, N-body units (raw HDF5 DTMIN).
    public: true
    nullable: false
  - name: rmin_nb
    dtype: float64
    unit: null
    ucd: pos.distance
    description: >
      Minimum two-body distance for regularization, N-body units (raw HDF5 RMIN). Raw
      N-body-unit value; multiply by rbar_pc for parsecs.
    public: true
    nullable: false
  - name: gmin
    dtype: float64
    unit: null
    ucd: meta.code
    description: Minimum relative perturbation for KS termination (raw HDF5 GMIN).
    public: true
    nullable: false
  - name: gmax
    dtype: float64
    unit: null
    ucd: meta.code
    description: Maximum relative perturbation for KS initiation (raw HDF5 GMAX).
    public: true
    nullable: false
  - name: smax
    dtype: float64
    unit: null
    ucd: time.interval
    description: Maximum timestep, N-body units (raw HDF5 SMAX).
    public: true
    nullable: false
  - name: nnbopt
    dtype: int64
    unit: null
    ucd: meta.number
    description: Optimal neighbor number (raw HDF5 NNBOPT).
    public: true
    nullable: false
  - name: epoch0_myr
    dtype: float64
    unit: Myr
    ucd: time.epoch
    description: Initial epoch of the simulation (raw HDF5 EPOCH0).
    public: true
    nullable: false
  - name: n_single
    dtype: int64
    unit: null
    ucd: meta.number
    description: Number of single stars at this snapshot (raw HDF5 N_SINGLE).
    public: true
    nullable: false
  - name: n_binary
    dtype: int64
    unit: null
    ucd: meta.number
    description: Number of binaries at this snapshot (raw HDF5 N_BINARY).
    public: true
    nullable: false
  - name: n_merger
    dtype: int64
    unit: null
    ucd: meta.number
    description: Cumulative number of merger/collision events up to this snapshot (raw HDF5 N_MERGER).
    public: true
    nullable: false
  - name: source_hdf5_path
    dtype: string
    unit: null
    ucd: meta.ref.url
    description: Absolute path of the source HDF5 file this row was derived from (provenance only).
    public: false
    nullable: false
