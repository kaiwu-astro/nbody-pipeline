# Site config for the madnuc group on JUWELS.
#
# Usage:
#   export NBODY_CONFIG=/path/to/this/repo/configs/juwels_madnuc.yaml
#   python -m nbody_pipeline
#
# or copy/symlink it to ./nbody_config.yaml at the repo root, or pass
# --config configs/juwels_madnuc.yaml explicitly. See config.example.yaml for
# a fully annotated template covering every available key.

paths:
  simulations:
    "0sb": "/e/scratch/madnuc/wu13/mar17-dragon3-start/00softBinary-5hardBinary"
    "20sb": "/e/scratch/madnuc/wu13/mar17-dragon3-start/20softBinary-5hardBinary"
    "60sb": "/e/scratch/madnuc/wu13/mar17-dragon3-start/60softBinary-5hardBinary"

  input_files:
    "0sb": "N1m-Dragon3.inp.init"
    "20sb": "N1m-Dragon3.inp.init"
    "60sb": "N1m-Dragon3.inp.init"

  plot_dir: "/e/scratch/madnuc/wu13/plot"

  analysis_cache_dir: "/e/scratch/madnuc/wu13/dragon3_intermediate_data_cache"

  lake_dir: "/e/data1/hhd32/wu13/dragon3_particle_lake"

figure_prefixes:
  "0sb": "dragon3_1m_5hb_0sb_Apr2025"
  "20sb": "dragon3_1m_5hb_20sb_Apr2025"
  "60sb": "dragon3_1m_5hb_60sb_Apr2025"

processing:
  skip_until:
    "0sb": "last"
    "20sb": "last"
    "60sb": "last"

particle_lake:
  enabled: false            # nightly 不自动跑；仅 analyze --features lake 显式触发
  scan:                     # 覆盖全局 hdf5 节 → HDF5ScanOptions
    sample_every_nb_time: null
    use_hdf5_cache: false   # 绝不在源目录（含 data1 归档）旁写 feather
    checkpoint_every_files: 25
