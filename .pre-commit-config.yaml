repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.13
        args: ['--line-length=100']
        # black 26.1.0 needs pathspec's post-1.0 API (pathspec.patterns.gitignore);
        # pin it explicitly so pre-commit's isolated hook env doesn't resolve an
        # older/incompatible pathspec that crashes the hook with
        # "ModuleNotFoundError: No module named 'pathspec.patterns.gitignore'".
        additional_dependencies: ['pathspec>=1.0.0,<2']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: ['--fix']
      - id: ruff-format
        args: ['--line-length=100']

