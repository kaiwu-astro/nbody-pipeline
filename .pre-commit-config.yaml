repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: ['--line-length=100']
        # Runs black from the currently active project venv instead of
        # pre-commit's own isolated hook venv. On this HPC, Lmod's PYTHONPATH
        # injection shadows whatever pathspec/click/etc. pip installs into an
        # isolated venv with an older module-provided copy, which crashes
        # black with "ModuleNotFoundError: No module named
        # 'pathspec.patterns.gitignore'" no matter what additional_dependencies
        # pins. The project venv carries a sitecustomize.py that reorders
        # sys.path so its own site-packages wins over PYTHONPATH, so its black
        # works correctly; `language: system` just reuses that fix instead of
        # re-fighting it inside a throwaway venv.

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: ['--fix']
      - id: ruff-format
        args: ['--line-length=100']

